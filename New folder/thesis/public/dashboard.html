<!DOCTYPE html>
<html>
<head>
    <title>Chairperson Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        
        /* Style for the Clear Button */
        .clear-btn { 
            background: #dc3545; 
            color: white; 
            padding: 10px 15px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
        }
        .clear-btn:hover { background: #a71d2a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Faculty Real-Time Monitoring</h1>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <p>Logged in as: <strong>Chairperson</strong></p>
            <button class="clear-btn" onclick="clearLogs()">Clear All Records</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Employee ID</th>
                    <th>Room</th>
                    <th>Current Status</th>
                    <th>Last Updated</th>
                    <th>Location</th>
                </tr>
            </thead>
            <tbody id="attendanceTable">
                </tbody>
        </table>
    </div>

<script>
    function loadAttendance() {
        fetch('/get-attendance')
            .then(res => res.json())
            .then(data => {
                const table = document.getElementById('attendanceTable');
                table.innerHTML = ""; 
                data.forEach(record => {
                    const row = `<tr>
                        <td>${record.employeeId}</td>
                        <td>${record.location}</td>
                        <td><strong>${record.status}</strong></td> 
                        <td>${new Date(record.timestamp).toLocaleTimeString()}</td>
                        <td>
                            <a href="https://www.google.com/maps?q=${record.gps.lat},${record.gps.lng}" target="_blank">
                                📍 View Map
                            </a>
                        </td>
                    </tr>`;
                    table.innerHTML += row;
                });
            });
    }

    // Single unified function to clear logs
    async function clearLogs() {
        if (confirm("Are you sure you want to delete all real-time logs? This cannot be undone.")) {
            try {
                const response = await fetch('/clear-attendance', { method: 'POST' });
                if (response.ok) {
                    alert("Logs cleared successfully!");
                    loadAttendance(); // Refresh table immediately
                } else {
                    alert("Failed to clear logs. Make sure you added the route to server.js.");
                }
            } catch (err) {
                console.error("Error:", err);
                alert("An error occurred while clearing logs.");
            }
        }
    }

    // Refresh dashboard every 5 seconds
    setInterval(loadAttendance, 5000); 
    loadAttendance();
</script>
</body>
</html>
